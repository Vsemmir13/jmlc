# EVA02 multilabel image classifier — public demo config
# Replace data paths and num_classes with your own dataset before training.

data:
  train_path: "data/demo/train.csv"
  test_path: "data/demo/test.csv"
  num_classes: 4
  resize: 448

model:
  name: "eva02"
  pretrained: true
  checkpoint_path: null
  head_type: "fc"
  fc_activation: "gelu"

loss:
  name: "db_loss"
  class_freq_path: null
  beta: 0.9
  focal_gamma: 1.3
  focal_alpha: 0.5
  map_param: 0.1
  neg_scale: 1.3

training:
  batch_size: 8
  num_epochs: 1
  num_workers: 2
  pin_memory: true
  prefetch_factor: 2
  use_bf16: true

optimizer:
  name: "adamw"
  lr: 0.00005
  weight_decay: 0.0
  momentum: 0.9

scheduler:
  name: "cosine"
  warmup_steps: 10
  warmup_start_lr: 0.0
  eta_min: 0.0

evaluation:
  eval_frequency: 5
  metrics: ["accuracy", "f1_score", "precision", "recall", "per_class_f1", "roc_auc", "pr_auc"]

checkpoint:
  save_dir: "checkpoints"
  final_checkpoint_path: "checkpoints/final_model.pth"
  save_best: true
  monitor_metric: "pr_auc"

wandb:
  enabled: false
  project: "multilabel-classifier"
  name: "eva02-demo"
  tags: ["multilabel", "classification", "eva02"]
  log_frequency: 10

device: "cuda"
